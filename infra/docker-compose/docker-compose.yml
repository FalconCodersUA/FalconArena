services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-falconarena}
      POSTGRES_USER: ${POSTGRES_USER:-falcon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-falcon}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-falcon} -d ${POSTGRES_DB:-falconarena}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-falcon}:${POSTGRES_PASSWORD:-falcon}@postgres:5432/${POSTGRES_DB:-falconarena}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PRISMA_SYNC_MODE: ${PRISMA_SYNC_MODE:-dbpush}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL:-}
      FRONTEND_OAUTH_SUCCESS_URL: ${FRONTEND_OAUTH_SUCCESS_URL:-}
      FRONTEND_OAUTH_FAILURE_URL: ${FRONTEND_OAUTH_FAILURE_URL:-}
    volumes:
      - backend_storage:/app/storage
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pg_data:
  redis_data:
  backend_storage:
  caddy_data:
  caddy_config:
