name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -ex
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"

            AUTH_REPO_URL="https://${{ secrets.GH_PULL_USERNAME }}:${{ secrets.GH_PULL_TOKEN }}@github.com/${{ github.repository }}.git"

            if [ ! -d .git ]; then
              git init
              git remote add origin "$AUTH_REPO_URL"
            fi

            git remote set-url origin "$AUTH_REPO_URL"

            if git show-ref --verify --quiet refs/heads/main; then
              git checkout main
              git pull --ff-only origin main
            else
              git fetch origin main
              git checkout -b main FETCH_HEAD
            fi

            git remote set-url origin "https://github.com/${{ github.repository }}.git"

            cp infra/docker-compose/.env.example infra/docker-compose/.env
            NODE_ENV_VALUE=production \
            POSTGRES_DB_VALUE="${{ secrets.POSTGRES_DB }}" \
            POSTGRES_USER_VALUE="${{ secrets.POSTGRES_USER }}" \
            POSTGRES_PASSWORD_VALUE="${{ secrets.POSTGRES_PASSWORD }}" \
            JWT_SECRET_VALUE="${{ secrets.JWT_SECRET }}" \
            BACKEND_PORT_VALUE=4000 \
            PRISMA_SYNC_MODE_VALUE="${{ secrets.PRISMA_SYNC_MODE || 'migrate' }}" \
            APP_DOMAIN_VALUE="${{ secrets.APP_DOMAIN || 'falconarena.live' }}" \
            VITE_API_URL_VALUE="${{ secrets.VITE_API_URL || 'https://falconarena.live' }}" \
            JOBS_WORKER_ENABLED_VALUE="${{ secrets.JOBS_WORKER_ENABLED || 'true' }}" \
            STORAGE_PROVIDER_VALUE="${{ secrets.STORAGE_PROVIDER || 'local' }}" \
            STORAGE_LOCAL_DIR_VALUE="/app/storage" \
            STORAGE_LOCAL_PUBLIC_PREFIX_VALUE="/uploads" \
            STORAGE_S3_ENDPOINT_VALUE="${{ secrets.STORAGE_S3_ENDPOINT || '' }}" \
            STORAGE_S3_REGION_VALUE="${{ secrets.STORAGE_S3_REGION || 'auto' }}" \
            STORAGE_S3_BUCKET_VALUE="${{ secrets.STORAGE_S3_BUCKET || '' }}" \
            STORAGE_S3_ACCESS_KEY_ID_VALUE="${{ secrets.STORAGE_S3_ACCESS_KEY_ID || '' }}" \
            STORAGE_S3_SECRET_ACCESS_KEY_VALUE="${{ secrets.STORAGE_S3_SECRET_ACCESS_KEY || '' }}" \
            STORAGE_S3_PUBLIC_BASE_URL_VALUE="${{ secrets.STORAGE_S3_PUBLIC_BASE_URL || '' }}" \
            STORAGE_S3_KEY_PREFIX_VALUE="${{ secrets.STORAGE_S3_KEY_PREFIX || 'falconarena' }}" \
            STORAGE_S3_FORCE_PATH_STYLE_VALUE="${{ secrets.STORAGE_S3_FORCE_PATH_STYLE || 'true' }}" \
            EMAIL_NOTIFICATIONS_ENABLED_VALUE="${{ secrets.EMAIL_NOTIFICATIONS_ENABLED || 'false' }}" \
            EMAIL_PROVIDER_VALUE="${{ secrets.EMAIL_PROVIDER || 'console' }}" \
            EMAIL_FROM_VALUE="${{ secrets.EMAIL_FROM || 'no-reply@falconarena.live' }}" \
            EMAIL_REPLY_TO_VALUE="${{ secrets.EMAIL_REPLY_TO || 'team@falconarena.live' }}" \
            RESEND_API_KEY_VALUE="${{ secrets.RESEND_API_KEY || '' }}" \
            GOOGLE_SHEETS_WEBHOOK_URL_VALUE="${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL || '' }}" \
            GOOGLE_SHEETS_WEBHOOK_SECRET_VALUE="${{ secrets.GOOGLE_SHEETS_WEBHOOK_SECRET || '' }}" \
            GOOGLE_SHEETS_DEFAULT_SHEET_NAME_VALUE="${{ secrets.GOOGLE_SHEETS_DEFAULT_SHEET_NAME || '' }}" \
            GOOGLE_CLIENT_ID_VALUE="${{ secrets.GOOGLE_CLIENT_ID || '' }}" \
            GOOGLE_CLIENT_SECRET_VALUE="${{ secrets.GOOGLE_CLIENT_SECRET || '' }}" \
            GOOGLE_CALLBACK_URL_VALUE="${{ secrets.GOOGLE_CALLBACK_URL || 'https://falconarena.live/auth/google/callback' }}" \
            GITHUB_CLIENT_ID_VALUE="${{ secrets.GH_OAUTH_CLIENT_ID || '' }}" \
            GITHUB_CLIENT_SECRET_VALUE="${{ secrets.GH_OAUTH_CLIENT_SECRET || '' }}" \
            GITHUB_CALLBACK_URL_VALUE="${{ secrets.GITHUB_CALLBACK_URL || 'https://falconarena.live/auth/github/callback' }}" \
            FRONTEND_OAUTH_SUCCESS_URL_VALUE="${{ secrets.FRONTEND_OAUTH_SUCCESS_URL || 'https://falconarena.live/app/oauth/callback' }}" \
            FRONTEND_OAUTH_FAILURE_URL_VALUE="${{ secrets.FRONTEND_OAUTH_FAILURE_URL || 'https://falconarena.live/app/oauth/callback' }}" \
            python3 scripts/update-compose-env.py infra/docker-compose/.env

            docker compose -f infra/docker-compose/docker-compose.yml --env-file infra/docker-compose/.env up -d --build --remove-orphans
            docker compose -f infra/docker-compose/docker-compose.yml --env-file infra/docker-compose/.env restart caddy
            curl -fsS --retry 40 --retry-delay 2 --retry-all-errors http://127.0.0.1:4000/health > /dev/null
            curl -fsS --retry 40 --retry-delay 2 --retry-all-errors --resolve falconarena.live:443:127.0.0.1 https://falconarena.live/health > /dev/null
            docker image prune -f
