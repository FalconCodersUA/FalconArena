name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"

            AUTH_REPO_URL="https://${{ secrets.GH_PULL_USERNAME }}:${{ secrets.GH_PULL_TOKEN }}@github.com/${{ github.repository }}.git"

            if [ ! -d .git ]; then
              git init
              git remote add origin "$AUTH_REPO_URL"
            fi

            git remote set-url origin "$AUTH_REPO_URL"

            if git show-ref --verify --quiet refs/heads/main; then
              git checkout main
              git pull --ff-only origin main
            else
              git fetch origin main
              git checkout -b main FETCH_HEAD
            fi

            git remote set-url origin "https://github.com/${{ github.repository }}.git"

            cat > infra/docker-compose/.env <<'EOF'
            NODE_ENV=production
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            BACKEND_PORT=4000
            PRISMA_SYNC_MODE=${{ secrets.PRISMA_SYNC_MODE || 'dbpush' }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN || 'falconarena.live' }}
            VITE_API_URL=${{ secrets.VITE_API_URL || 'https://falconarena.live' }}
            JOBS_WORKER_ENABLED=${{ secrets.JOBS_WORKER_ENABLED || 'true' }}
            STORAGE_PROVIDER=${{ secrets.STORAGE_PROVIDER || 'local' }}
            STORAGE_LOCAL_DIR=/app/storage
            STORAGE_LOCAL_PUBLIC_PREFIX=/uploads
            STORAGE_S3_ENDPOINT=${{ secrets.STORAGE_S3_ENDPOINT || '' }}
            STORAGE_S3_REGION=${{ secrets.STORAGE_S3_REGION || 'auto' }}
            STORAGE_S3_BUCKET=${{ secrets.STORAGE_S3_BUCKET || '' }}
            STORAGE_S3_ACCESS_KEY_ID=${{ secrets.STORAGE_S3_ACCESS_KEY_ID || '' }}
            STORAGE_S3_SECRET_ACCESS_KEY=${{ secrets.STORAGE_S3_SECRET_ACCESS_KEY || '' }}
            STORAGE_S3_PUBLIC_BASE_URL=${{ secrets.STORAGE_S3_PUBLIC_BASE_URL || '' }}
            STORAGE_S3_KEY_PREFIX=${{ secrets.STORAGE_S3_KEY_PREFIX || 'falconarena' }}
            STORAGE_S3_FORCE_PATH_STYLE=${{ secrets.STORAGE_S3_FORCE_PATH_STYLE || 'true' }}
            EMAIL_NOTIFICATIONS_ENABLED=${{ secrets.EMAIL_NOTIFICATIONS_ENABLED || 'false' }}
            EMAIL_PROVIDER=${{ secrets.EMAIL_PROVIDER || 'console' }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM || 'no-reply@falconarena.live' }}
            EMAIL_REPLY_TO=${{ secrets.EMAIL_REPLY_TO || 'team@falconarena.live' }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY || '' }}
            GOOGLE_SHEETS_WEBHOOK_URL=${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL || '' }}
            GOOGLE_SHEETS_WEBHOOK_SECRET=${{ secrets.GOOGLE_SHEETS_WEBHOOK_SECRET || '' }}
            GOOGLE_SHEETS_DEFAULT_SHEET_NAME=${{ secrets.GOOGLE_SHEETS_DEFAULT_SHEET_NAME || '' }}
            EOF

            docker compose -f infra/docker-compose/docker-compose.yml --env-file infra/docker-compose/.env up -d --build --remove-orphans
            docker compose -f infra/docker-compose/docker-compose.yml --env-file infra/docker-compose/.env restart caddy
            curl -fsS --retry 40 --retry-delay 2 --retry-all-errors http://127.0.0.1:4000/health > /dev/null
            curl -fsS --retry 40 --retry-delay 2 --retry-all-errors --resolve falconarena.live:443:127.0.0.1 https://falconarena.live/health > /dev/null
            docker image prune -f
